project_name: "long-context-comparison"

task:
  name: "summarization"
  data_path: "data/processed/pilot_sum.jsonl"
  max_samples: 5

model:
  name: "mistralai/Mistral-7B-Instruct-v0.2"
  architecture: "decoder-only"
  use_4bit: true

generation:
  max_input_tokens: 2048
  max_new_tokens: 128
  do_sample: false
  temperature: 0.0

runtime:
  device: "auto"

output:
  predictions_dir: "outputs/predictions"
  metrics_dir: "outputs/metrics"
  logs_dir: "outputs/logs"